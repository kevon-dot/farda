name: farda
description: "A medical vial project"


version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.0
  intl: ^0.20.2
  otp_text_field: ^1.1.3
  clipboard: ^0.1.3
  easy_stepper: ^0.8.5+1
  logger: ^2.6.0
  json_annotation: ^4.9.0
  freezed_annotation: ^3.1.0
  toastification: ^3.0.3
  go_router: ^16.0.0
  provider: ^6.1.5
  shared_preferences: ^2.5.3
  image_picker: ^1.1.2
  flutter_dotenv: ^6.0.0
  flutter_secure_storage: ^10.0.0
  http: ^1.6.0
  flutter_blue_plus: 1.31.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env.development
    - .env.staging
    - .env.production
  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Light.ttf
          weight: 300
        - asset: assets/fonts/Outfit-Regular.ttf
          weight: 400
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
