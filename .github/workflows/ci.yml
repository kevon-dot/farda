name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  backend-main:
    name: Main API (tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: farda-app-backend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: farda-app-backend/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts
      - name: Run unit tests
        run: pnpm test

  backend-vial:
    name: Vial API (tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smart-vial-backend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: smart-vial-backend/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts
      - name: Run unit tests
        run: pnpm test

  mobile-app:
    name: Mobile app (tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: farda-app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Materialize env asset files
        # pubspec.yaml declares .env.* as bundled assets. Real env files are
        # gitignored (they may hold secrets), so generate non-secret copies
        # from the committed example before building the asset bundle.
        run: |
          cp .env.example .env.development
          cp .env.example .env.staging
          cp .env.example .env.production
      - name: Install dependencies
        run: flutter pub get
      - name: Run unit tests
        run: flutter test
